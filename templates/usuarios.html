<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Usuários</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="main">

        <div class="table-box">

            <div class="table-header">

                <h2>
                    Gerenciar Usuários
                </h2>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Usuário</th>

                        <th>Admin</th>

                        <th>Ações</th>

                    </tr>

                </thead>

                <tbody>

                    {% for usuario in usuarios %}

                    <tr>

                        <td>
                            {{ usuario.id }}
                        </td>

                        <td>
                            {{ usuario.username }}
                        </td>

                        <td>

                            {% if usuario.admin %}

                            ✅ Sim

                            {% else %}

                            ❌ Não

                            {% endif %}

                        </td>

                        <td>

                            <a href="/excluir_usuario/{{ usuario.id }}" class="delete-btn" onclick="return confirm(
                                'Excluir usuário?'
                            )">

                                Excluir

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
